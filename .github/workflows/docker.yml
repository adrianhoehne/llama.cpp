name: Publish CUDA Docker image

on:
  workflow_dispatch:
    inputs:
      image_target:
        description: "Docker target to build"
        type: choice
        default: server
        options:
          - server
          - light
          - full
      cuda_version:
        description: "CUDA container version"
        type: string
        default: "12.8.1"
      cuda_arch:
        description: "CMake CUDA architectures"
        type: string
        default: "50;61;70;75;80;86;89;90"
  push:
    branches:
      - cached-experts-v2
    paths:
      - ".devops/cuda.Dockerfile"
      - ".github/workflows/docker.yml"
      - "common/**"
      - "examples/**"
      - "ggml/**"
      - "include/**"
      - "src/**"
      - "tools/**"
      - "CMakeLists.txt"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  cuda:
    name: Build and publish CUDA image
    runs-on: ubuntu-24.04

    env:
      IMAGE_TARGET: ${{ github.event.inputs.image_target || 'server' }}
      CUDA_VERSION: ${{ github.event.inputs.cuda_version || '12.8.1' }}
      CUDA_DOCKER_ARCH: ${{ github.event.inputs.cuda_arch || '50;61;70;75;80;86;89;90' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Free disk space
        uses: ggml-org/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Prepare image metadata
        id: meta
        shell: bash
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${REPOSITORY_NAME}"
          image_repo="ghcr.io/${owner}/${repo}"
          short_sha="${GITHUB_SHA::12}"
          ref_name="${GITHUB_REF_NAME:-manual}"
          safe_ref="$(printf '%s' "$ref_name" | tr '/[:upper:]' '-[:lower:]' | tr -cd 'a-z0-9_.-')"
          cuda_major="${CUDA_VERSION%%.*}"

          echo "image_repo=${image_repo}" >> "$GITHUB_OUTPUT"
          echo "created=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "safe_ref=${safe_ref}" >> "$GITHUB_OUTPUT"
          echo "cuda_major=${cuda_major}" >> "$GITHUB_OUTPUT"

      - name: Build and push CUDA image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          file: .devops/cuda.Dockerfile
          target: ${{ env.IMAGE_TARGET }}
          platforms: linux/amd64
          push: true
          provenance: false
          build-args: |
            CUDA_VERSION=${{ env.CUDA_VERSION }}
            CUDA_DOCKER_ARCH=${{ env.CUDA_DOCKER_ARCH }}
            BUILD_DATE=${{ steps.meta.outputs.created }}
            APP_VERSION=${{ steps.meta.outputs.safe_ref }}-${{ steps.meta.outputs.short_sha }}
            APP_REVISION=${{ github.sha }}
            IMAGE_URL=${{ github.server_url }}/${{ github.repository }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
          tags: |
            ${{ steps.meta.outputs.image_repo }}:${{ env.IMAGE_TARGET }}-cuda
            ${{ steps.meta.outputs.image_repo }}:${{ env.IMAGE_TARGET }}-cuda${{ steps.meta.outputs.cuda_major }}
            ${{ steps.meta.outputs.image_repo }}:${{ env.IMAGE_TARGET }}-cuda-${{ steps.meta.outputs.safe_ref }}
            ${{ steps.meta.outputs.image_repo }}:${{ env.IMAGE_TARGET }}-cuda-${{ steps.meta.outputs.short_sha }}
          labels: |
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}
            org.opencontainers.image.version=${{ steps.meta.outputs.safe_ref }}-${{ steps.meta.outputs.short_sha }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=llama.cpp
            org.opencontainers.image.description=LLM inference in C/C++ with CUDA
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
